services:
  wanlu-jade:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: wanlu-jade
    restart: unless-stopped
    env_file:
      - ../.env.production
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
